name: Pulse daily refresh

# Each day: an AI writes one brand-new original tip (generate_tip.py), then the
# bulletproof refresh.py inserts it into /pulse/ + the JSON-LD and validates,
# then we push so Vercel auto-deploys the genuine file change (SEO freshness).
# If the AI step fails for any reason, refresh.py posts a pre-written fallback,
# so the daily deploy always happens.

on:
  schedule:
    # 08:00 UTC daily. Cron times are always UTC on GitHub Actions.
    - cron: "0 8 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate a fresh AI tip (resilient; falls back if it fails)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pulse/generate_tip.py

      - name: Run Pulse refresh
        run: python pulse/refresh.py

      - name: Commit and push if changed
        run: |
          git config user.name "sheetready-pulse-bot"
          git config user.email "actions@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit (no unposted tips left)."
            exit 0
          fi
          git add -A
          git commit -m "pulse: daily fresh tip (auto)"
          git push
