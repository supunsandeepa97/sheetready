<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Page not found — SheetReady</title>
<meta name="robots" content="noindex,follow"/>
<meta name="theme-color" content="#FBFCFE" media="(prefers-color-scheme: light)"/>
<meta name="theme-color" content="#0E1726" media="(prefers-color-scheme: dark)"/>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23102544'/%3E%3Crect x='16.5' y='16.5' width='8.5' height='8.5' rx='1.5' fill='%23F2B705'/%3E%3Cpath d='M18.3 20.9l1.7 1.7 3-3.4' fill='none' stroke='%23102544' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cg stroke='%23F2B705' stroke-width='1.7' stroke-linecap='round'%3E%3Cline x1='7' y1='16' x2='25' y2='16'/%3E%3Cline x1='16' y1='7' x2='16' y2='25'/%3E%3C/g%3E%3Crect x='7' y='7' width='18' height='18' rx='2.5' fill='none' stroke='%23F2B705' stroke-width='1.7'/%3E%3Ccircle cx='25' cy='25' r='2.4' fill='%23F2B705' stroke='%23102544' stroke-width='1.2'/%3E%3C/svg%3E"/>
<!-- No-flash theme bootstrap: apply a manual LIGHT/DARK choice (set via the
     header toggle, stored in localStorage 'sr-theme') BEFORE first paint.
     If no manual choice exists, nothing is set and prefers-color-scheme wins.
     Tiny synchronous inline script (allowed by CSP 'unsafe-inline'). -->
<script>
  (function(){try{var t=localStorage.getItem('sr-theme');
    if(t==='dark'||t==='light'){document.documentElement.setAttribute('data-theme',t);}
  }catch(e){}})();
</script>

<style>
  :root{
    --navy:#1B3A6B;--navy-deep:#102544;--navy-ink:#0E1A33;--gold:#E0A209;--gold-text:#8A6100;--emerald:#11825A;
    --bg:#FBFCFE;--surface:#F2F5FB;--card:#FFFFFF;--line:#E6EAF2;--muted:#566480;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",Roboto,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono","Cascadia Mono","Segoe UI Mono",Consolas,"Liberation Mono",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{font-family:var(--sans);color:var(--navy-ink);min-height:100vh;line-height:1.6;
    display:flex;align-items:center;justify-content:center;text-align:center;padding:32px;
    -webkit-font-smoothing:antialiased;background:
      radial-gradient(680px 380px at 78% 4%,rgba(224,162,9,.10),transparent 62%),
      radial-gradient(720px 520px at 14% -8%,rgba(27,58,107,.08),transparent 60%),var(--bg)}
  :focus-visible{outline:3px solid var(--gold);outline-offset:2px;border-radius:6px}
  .wrap{max-width:560px}
  .brand{display:inline-flex;align-items:center;gap:10px;font-weight:800;font-size:21px;
    letter-spacing:-.03em;color:var(--navy-ink);text-decoration:none;margin-bottom:34px}
  .brand .mark{width:30px;height:30px}
  .brand .g{color:var(--gold-text)}
  .card404{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:46px 38px;
    box-shadow:0 2px 6px rgba(16,37,68,.06),0 18px 50px rgba(16,37,68,.12)}
  .code{display:inline-flex;align-items:center;gap:9px;font-family:var(--mono);font-size:12px;font-weight:600;
    letter-spacing:.14em;text-transform:uppercase;color:var(--gold-text);
    background:#FFF6E1;border:1px solid #f4e6bd;padding:7px 13px;border-radius:999px;margin-bottom:20px}
  h1{font-size:clamp(26px,5vw,34px);line-height:1.12;letter-spacing:-.022em;margin-bottom:14px}
  p{color:var(--muted);font-size:16.5px;margin-bottom:30px}
  .btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  a.btn{display:inline-flex;align-items:center;gap:9px;text-decoration:none;font-weight:700;
    padding:14px 24px;border-radius:13px;font-size:15px;transition:transform .15s ease,box-shadow .15s ease,background .15s ease}
  a.home{background:var(--navy-ink);color:#fff;box-shadow:0 1px 2px rgba(16,37,68,.04),0 4px 14px rgba(16,37,68,.05)}
  a.home:hover{background:var(--navy);transform:translateY(-2px);box-shadow:0 2px 6px rgba(16,37,68,.06),0 18px 40px rgba(16,37,68,.1)}
  a.alt{background:#fff;color:var(--navy-ink);border:1.5px solid var(--line)}
  a.alt:hover{border-color:#c7d2e8;background:var(--surface)}
  @media (prefers-reduced-motion:reduce){*{transition:none !important}}

  /* Theme toggle (manual light/dark, overrides the OS). Fixed top-right since
     this page has no header nav. Icon swap is pure CSS → no flash. */
  .themetoggle{position:fixed;top:16px;right:16px;z-index:10;
    display:inline-flex;align-items:center;justify-content:center;
    width:42px;height:42px;padding:0;border-radius:12px;cursor:pointer;
    background:var(--card);border:1px solid var(--line);color:var(--muted);
    transition:color .15s ease,background .15s ease,border-color .15s ease}
  .themetoggle:hover{color:var(--navy-ink);border-color:#c7d2e8}
  .themetoggle svg{width:20px;height:20px;display:block}
  .themetoggle .ic-sun{display:none}
  .themetoggle .ic-moon{display:block}
  @media (prefers-color-scheme:dark){
    :root:not([data-theme="light"]) .themetoggle .ic-sun{display:block}
    :root:not([data-theme="light"]) .themetoggle .ic-moon{display:none}
    :root:not([data-theme="light"]) .themetoggle:hover{border-color:rgba(255,255,255,.22)}
  }
  :root[data-theme="dark"] .themetoggle .ic-sun{display:block}
  :root[data-theme="dark"] .themetoggle .ic-moon{display:none}
  :root[data-theme="dark"] .themetoggle:hover{border-color:rgba(255,255,255,.22)}
  :root[data-theme="light"] .themetoggle .ic-sun{display:none}
  :root[data-theme="light"] .themetoggle .ic-moon{display:block}

  /* Automatic dark mode — light theme above is the untouched default. */
  @media (prefers-color-scheme:dark){
    /* device-dark, unless the visitor has FORCED light via the toggle */
    :root:not([data-theme="light"]){
      --navy:#9FC0F0;--navy-deep:#0A1322;--navy-ink:#E8EDF5;--gold:#E0A209;--gold-text:#F6C948;
      --emerald:#4FD0A0;--bg:#0E1726;--surface:#16233A;--card:#172A45;
      --line:rgba(255,255,255,.10);--muted:#9AA7BD;
    }

    :root:not([data-theme="light"]) .card404{box-shadow:0 2px 6px rgba(0,0,0,.35),0 18px 50px rgba(0,0,0,.5)}
    :root:not([data-theme="light"]) .code{background:#2A2210;border-color:#4a3c18}
    /* DARK-MODE SURFACE DECOUPLING (bugfix): a.home used --navy-ink as a
       dark button bg with #fff label; --navy-ink flips light in dark mode,
       so it became white-on-white. → gold fill + navy-deep label (8.3:1). */
    :root:not([data-theme="light"]) a.home{background:var(--gold);color:var(--navy-deep);
      box-shadow:0 1px 2px rgba(0,0,0,.3),0 4px 14px rgba(0,0,0,.35)}
    :root:not([data-theme="light"]) a.home:hover{background:var(--gold-text);color:var(--navy-deep);
      box-shadow:0 2px 6px rgba(0,0,0,.35),0 18px 40px rgba(0,0,0,.45)}
    :root:not([data-theme="light"]) a.alt{background:var(--card)}
    :root:not([data-theme="light"]) a.alt:hover{border-color:rgba(255,255,255,.22);background:var(--surface)}
  }

  /* =========================================================
     FORCED DARK (manual toggle) — user chose dark on ANY device.
     Mirrors the device-dark skin above so the toggle overrides the OS.
     ========================================================= */
  :root[data-theme="dark"]{
      --navy:#9FC0F0;--navy-deep:#0A1322;--navy-ink:#E8EDF5;--gold:#E0A209;--gold-text:#F6C948;
      --emerald:#4FD0A0;--bg:#0E1726;--surface:#16233A;--card:#172A45;
      --line:rgba(255,255,255,.10);--muted:#9AA7BD;
    }
    :root[data-theme="dark"] .card404{box-shadow:0 2px 6px rgba(0,0,0,.35),0 18px 50px rgba(0,0,0,.5)}
    :root[data-theme="dark"] .code{background:#2A2210;border-color:#4a3c18}
    /* DARK-MODE SURFACE DECOUPLING (bugfix): a.home used --navy-ink as a
       dark button bg with #fff label; --navy-ink flips light in dark mode,
       so it became white-on-white. → gold fill + navy-deep label (8.3:1). */
    :root[data-theme="dark"] a.home{background:var(--gold);color:var(--navy-deep);
      box-shadow:0 1px 2px rgba(0,0,0,.3),0 4px 14px rgba(0,0,0,.35)}
    :root[data-theme="dark"] a.home:hover{background:var(--gold-text);color:var(--navy-deep);
      box-shadow:0 2px 6px rgba(0,0,0,.35),0 18px 40px rgba(0,0,0,.45)}
    :root[data-theme="dark"] a.alt{background:var(--card)}
    :root[data-theme="dark"] a.alt:hover{border-color:rgba(255,255,255,.22);background:var(--surface)}
</style>
</head>
<body>
  <button type="button" class="themetoggle" id="themeToggle" aria-label="Switch to dark theme">
    <svg class="ic-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
    <svg class="ic-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2.5M12 19.5V22M4.2 4.2l1.8 1.8M18 18l1.8 1.8M2 12h2.5M19.5 12H22M4.2 19.8l1.8-1.8M18 6l1.8-1.8"/></svg>
  </button>
  <main class="wrap">
    <a class="brand" href="/" aria-label="SheetReady home">
      <svg class="mark" viewBox="0 0 32 32" aria-hidden="true"><rect width="32" height="32" rx="8" fill="#102544"/><rect x="16.5" y="16.5" width="8.5" height="8.5" rx="1.5" fill="#F2B705"/><path d="M18.3 20.9l1.7 1.7 3-3.4" fill="none" stroke="#102544" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><g stroke="#F2B705" stroke-width="1.7" stroke-linecap="round"><line x1="7" y1="16" x2="25" y2="16"/><line x1="16" y1="7" x2="16" y2="25"/></g><rect x="7" y="7" width="18" height="18" rx="2.5" fill="none" stroke="#F2B705" stroke-width="1.7"/><circle cx="25" cy="25" r="2.4" fill="#F2B705" stroke="#102544" stroke-width="1.2"/></svg>
      <span>Sheet<span class="g">Ready</span></span>
    </a>
    <div class="card404">
      <span class="code"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="13"/><line x1="12" y1="16" x2="12" y2="16"/></svg> Error 404</span>
      <h1>This page wandered off the spreadsheet.</h1>
      <p>The page you're looking for doesn't exist or has moved. Let's get you back to the templates.</p>
      <div class="btns">
        <a class="btn home" href="/"><span aria-hidden="true">←</span> Back to home</a>
        <a class="btn alt" href="/#templates">Browse templates</a>
        <a class="btn alt" href="/pulse/">Daily Pulse</a>
      </div>
    </div>
  </main>
  <script>
    (function(){
      var themeBtn=document.getElementById('themeToggle');
      if(!themeBtn)return;
      var mqDark=window.matchMedia?window.matchMedia('(prefers-color-scheme:dark)'):null;
      function effectiveTheme(){
        var a=document.documentElement.getAttribute('data-theme');
        if(a==='dark'||a==='light')return a;
        return (mqDark&&mqDark.matches)?'dark':'light';
      }
      function syncThemeUI(){
        var eff=effectiveTheme();
        themeBtn.setAttribute('aria-label',eff==='dark'?'Switch to light theme':'Switch to dark theme');
        var color=eff==='dark'?'#0E1726':'#FBFCFE';
        var metas=document.querySelectorAll('meta[name="theme-color"]');
        metas.forEach(function(m){m.setAttribute('content',color);});
      }
      themeBtn.addEventListener('click',function(){
        var next=effectiveTheme()==='dark'?'light':'dark';
        document.documentElement.dataset.theme=next;
        try{localStorage.setItem('sr-theme',next);}catch(e){}
        syncThemeUI();
      });
      if(mqDark&&mqDark.addEventListener){
        mqDark.addEventListener('change',function(){
          if(!document.documentElement.getAttribute('data-theme')){syncThemeUI();}
        });
      }
      syncThemeUI();
    })();
  </script>
</body>
</html>
