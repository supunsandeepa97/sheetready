<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Page not found — SheetReady</title>
<meta name="robots" content="noindex,follow"/>
<style>
  :root{--navy:#1F3864;--navy-deep:#14254a;--gold:#F2B705;--paper:#f5f7fb;--muted:#aebbd6;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--navy-deep);color:#fff;display:flex;align-items:center;justify-content:center;
    min-height:100vh;text-align:center;padding:32px;line-height:1.55}
  .wrap{max-width:520px}
  .brand{font-weight:800;font-size:26px;letter-spacing:.5px;margin-bottom:28px}
  .brand .g{color:var(--gold)}
  .code{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:var(--gold);
    font-size:14px;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
  h1{font-size:30px;line-height:1.2;margin-bottom:14px}
  p{color:var(--muted);font-size:16px;margin-bottom:28px}
  .btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  a.btn{display:inline-block;text-decoration:none;font-weight:700;padding:13px 22px;border-radius:10px;font-size:15px}
  a.home{background:var(--gold);color:var(--navy-deep)}
  a.alt{background:transparent;color:#fff;border:1px solid #3a4f7a}
  a.btn:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
</style>
</head>
<body>
  <main class="wrap">
    <div class="brand">Sheet<span class="g">Ready</span></div>
    <div class="code">Error 404</div>
    <h1>This page wandered off the spreadsheet.</h1>
    <p>The page you're looking for doesn't exist or has moved. Let's get you back to the templates.</p>
    <div class="btns">
      <a class="btn home" href="/">← Back to home</a>
      <a class="btn alt" href="/#templates">Browse templates</a>
    </div>
  </main>
</body>
</html>
